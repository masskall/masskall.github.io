# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Theme Settings
remote_theme             : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "dark" 

# Site Settings
# ... (下面保持不变)
locale                   : "en-China"
rtl                      : false
title                    : "Chen Xi's Portfolio"
title_separator          : "-"
subtitle                 : 
name                     : "Chen Xi"
description              : "AI Undergraduate @ MUST | Exploring Machine Learning, Computer Vision, and LLMs"
url                      : "https://masskall.github.io"
baseurl                  : ""
repository               : "masskall/masskall.github.io"
teaser                   : 
logo                     : 
masthead_title           : 
breadcrumbs              : false
words_per_minute         : 200
enable_copy_code_button  : true
copyright                : 
copyright_url            : 

# Site Author (左侧边栏个人简介)
author:
  name             : "Chen Xi"
  avatar           : /assets/images/useer.jpg
  bio              : "AI Undergraduate at Macau University of Science and Technology. Passionate about exploring Artificial Intelligence, building machine learning models, and solving complex problems through technology."
  location         : "Macau, SAR"
  email            : "3464921481@qq.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/must-ai-Chen Xi/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/masskall"

# Site Footer (网页底部图标)
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/must-ai-Chen Xi/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/masskall"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:3464921481@qq.com"
  since: "2024"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs 
  - /test 
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed 

# Outputting
permalink: /:categories/:title/
timezone: 

# Pagination with jekyll-paginate
paginate: 5 
paginate_path: /page:num/

# Pagination with jekyll-paginate-v2
pagination:
  debug: false
  collection: 'posts'
  per_page: 10
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
  category: 'posts'
  tag: ''
  locale: ''
  trail:
    before: 2
    after: 2

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
